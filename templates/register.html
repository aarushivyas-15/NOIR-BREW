<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | NOIR BREW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css" />
</head>

<body class="bg-background text-foreground">

    <div class="min-h-screen flex items-center justify-center px-6">
        <div class="w-full max-w-md">

            <!-- Logo -->
            <div class="text-center mb-8">
                <a href="/" class="text-3xl font-serif font-bold text-foreground">
                    NOIR<span class="text-primary">BREW</span>
                </a>
                <p class="text-muted-foreground mt-2">Create your account</p>
            </div>

            <!-- Card -->
            <div class="bg-card border border-border rounded-2xl p-8">
                <h2 class="text-2xl font-serif font-bold text-foreground mb-6">Sign Up</h2>

                <!-- Error Message -->
                <div id="error-msg" class="hidden mb-4 p-3 rounded-lg text-sm"
                    style="background:color-mix(in oklch, var(--destructive) 15%, transparent);color:var(--destructive);">
                </div>

                <!-- Success Message -->
                <div id="success-msg" class="hidden mb-4 p-3 rounded-lg text-sm"
                    style="background:color-mix(in oklch, var(--primary) 15%, transparent);color:var(--primary);">
                </div>

                <!-- Form -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-2">Full Name</label>
                        <input id="name" type="text" placeholder="John Doe"
                            class="w-full bg-background border border-border text-foreground placeholder:text-muted-foreground h-12 px-4 rounded-lg outline-none transition-colors focus:border-primary" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-2">Email</label>
                        <input id="email" type="email" placeholder="hello@example.com"
                            class="w-full bg-background border border-border text-foreground placeholder:text-muted-foreground h-12 px-4 rounded-lg outline-none transition-colors focus:border-primary" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-2">Password</label>
                        <input id="password" type="password" placeholder="••••••••"
                            class="w-full bg-background border border-border text-foreground placeholder:text-muted-foreground h-12 px-4 rounded-lg outline-none transition-colors focus:border-primary" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-2">Confirm Password</label>
                        <input id="confirm-password" type="password" placeholder="••••••••"
                            class="w-full bg-background border border-border text-foreground placeholder:text-muted-foreground h-12 px-4 rounded-lg outline-none transition-colors focus:border-primary" />
                    </div>
                    <button onclick="handleRegister()"
                        class="w-full btn-primary-lg h-12 flex items-center justify-center">
                        <span id="btn-text">Create Account</span>
                    </button>
                </div>

                <p class="text-center text-sm text-muted-foreground mt-6">
                    Already have an account?
                    <a href="/login" class="text-primary hover:underline font-medium">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        async function handleRegister() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            const btnText = document.getElementById('btn-text');

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            if (!name || !email || !password || !confirmPassword) {
                errorMsg.textContent = 'Please fill in all fields';
                errorMsg.classList.remove('hidden');
                return;
            }

            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.classList.remove('hidden');
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters';
                errorMsg.classList.remove('hidden');
                return;
            }

            btnText.textContent = 'Creating account...';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    successMsg.textContent = 'Account created! Redirecting to login...';
                    successMsg.classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    errorMsg.textContent = data.detail || 'Registration failed';
                    errorMsg.classList.remove('hidden');
                    btnText.textContent = 'Create Account';
                }
            } catch (err) {
                errorMsg.textContent = 'Something went wrong. Try again.';
                errorMsg.classList.remove('hidden');
                btnText.textContent = 'Create Account';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleRegister();
        });
    </script>
</body>

</html>
